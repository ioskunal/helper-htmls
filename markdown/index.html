<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Markdown Live Preview</title>

<!-- marked.js -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<!-- DOMPurify -->
<script src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js"></script>
<!-- highlight.js -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github.min.css" id="hljs-light">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github-dark.min.css" id="hljs-dark" disabled>
<script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>

<style>
  :root {
    --bg: #ffffff;
    --bg-secondary: #f6f8fa;
    --text: #1f2328;
    --text-secondary: #656d76;
    --border: #d0d7de;
    --toolbar-bg: #f6f8fa;
    --toolbar-border: #d0d7de;
    --editor-bg: #ffffff;
    --preview-bg: #ffffff;
    --btn-bg: #f6f8fa;
    --btn-hover: #eaeef2;
    --btn-text: #1f2328;
    --code-bg: #f6f8fa;
    --blockquote-border: #d0d7de;
    --blockquote-text: #656d76;
    --table-border: #d0d7de;
    --table-row-alt: #f6f8fa;
    --link: #0969da;
    --scrollbar-thumb: #c1c1c1;
    --scrollbar-track: #f1f1f1;
    --shadow: rgba(31, 35, 40, 0.12);
  }

  [data-theme="dark"] {
    --bg: #0d1117;
    --bg-secondary: #161b22;
    --text: #e6edf3;
    --text-secondary: #8b949e;
    --border: #30363d;
    --toolbar-bg: #161b22;
    --toolbar-border: #30363d;
    --editor-bg: #0d1117;
    --preview-bg: #0d1117;
    --btn-bg: #21262d;
    --btn-hover: #30363d;
    --btn-text: #e6edf3;
    --code-bg: #161b22;
    --blockquote-border: #30363d;
    --blockquote-text: #8b949e;
    --table-border: #30363d;
    --table-row-alt: #161b22;
    --link: #58a6ff;
    --scrollbar-thumb: #484f58;
    --scrollbar-track: #161b22;
    --shadow: rgba(0, 0, 0, 0.3);
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    transition: background 0.2s, color 0.2s;
  }

  /* Toolbar */
  .toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 16px;
    background: var(--toolbar-bg);
    border-bottom: 1px solid var(--toolbar-border);
    flex-shrink: 0;
    gap: 8px;
    flex-wrap: wrap;
  }

  .toolbar-title {
    font-size: 16px;
    font-weight: 600;
    white-space: nowrap;
  }

  .toolbar-actions {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .toolbar button {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 6px 12px;
    font-size: 13px;
    font-family: inherit;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--btn-bg);
    color: var(--btn-text);
    cursor: pointer;
    transition: background 0.15s;
    white-space: nowrap;
  }

  .toolbar button:hover {
    background: var(--btn-hover);
  }

  .toolbar button svg {
    width: 16px;
    height: 16px;
    fill: currentColor;
  }

  /* Main panels */
  .main {
    display: flex;
    flex: 1;
    min-height: 0;
  }

  .panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }

  .panel-header {
    padding: 6px 16px;
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-secondary);
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .editor-panel {
    border-right: 1px solid var(--border);
  }

  .panel.drag-over,
  .editor-panel.drag-over {
    outline: 2px dashed var(--link);
    outline-offset: -4px;
  }

  #editor {
    flex: 1;
    width: 100%;
    padding: 16px;
    font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
    font-size: 14px;
    line-height: 1.6;
    border: none;
    outline: none;
    resize: none;
    background: var(--editor-bg);
    color: var(--text);
    tab-size: 4;
  }

  #preview {
    flex: 1;
    padding: 16px 24px;
    overflow-y: auto;
    background: var(--preview-bg);
    line-height: 1.6;
  }

  /* Scrollbar styling */
  #editor::-webkit-scrollbar,
  #preview::-webkit-scrollbar {
    width: 8px;
  }
  #editor::-webkit-scrollbar-track,
  #preview::-webkit-scrollbar-track {
    background: var(--scrollbar-track);
  }
  #editor::-webkit-scrollbar-thumb,
  #preview::-webkit-scrollbar-thumb {
    background: var(--scrollbar-thumb);
    border-radius: 4px;
  }

  /* Markdown rendered styles */
  #preview h1, #preview h2, #preview h3,
  #preview h4, #preview h5, #preview h6 {
    margin-top: 24px;
    margin-bottom: 16px;
    font-weight: 600;
    line-height: 1.25;
  }
  #preview h1 { font-size: 2em; padding-bottom: 0.3em; border-bottom: 1px solid var(--border); }
  #preview h2 { font-size: 1.5em; padding-bottom: 0.3em; border-bottom: 1px solid var(--border); }
  #preview h3 { font-size: 1.25em; }
  #preview h4 { font-size: 1em; }
  #preview h5 { font-size: 0.875em; }
  #preview h6 { font-size: 0.85em; color: var(--text-secondary); }

  #preview p { margin-bottom: 16px; }

  #preview a { color: var(--link); text-decoration: none; }
  #preview a:hover { text-decoration: underline; }

  #preview strong { font-weight: 600; }

  #preview ul, #preview ol {
    padding-left: 2em;
    margin-bottom: 16px;
  }
  #preview li { margin-bottom: 4px; }
  #preview li + li { margin-top: 4px; }

  #preview blockquote {
    margin: 0 0 16px;
    padding: 0 1em;
    color: var(--blockquote-text);
    border-left: 0.25em solid var(--blockquote-border);
  }

  #preview code {
    padding: 0.2em 0.4em;
    font-size: 85%;
    background: var(--code-bg);
    border-radius: 6px;
    font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
  }

  #preview pre {
    margin-bottom: 16px;
    padding: 16px;
    overflow-x: auto;
    background: var(--code-bg);
    border-radius: 6px;
    line-height: 1.45;
  }

  #preview pre code {
    padding: 0;
    background: transparent;
    font-size: 85%;
  }

  #preview table {
    border-collapse: collapse;
    width: 100%;
    margin-bottom: 16px;
  }
  #preview th, #preview td {
    padding: 6px 13px;
    border: 1px solid var(--table-border);
  }
  #preview th {
    font-weight: 600;
    background: var(--bg-secondary);
  }
  #preview tr:nth-child(even) {
    background: var(--table-row-alt);
  }

  #preview hr {
    height: 0.25em;
    padding: 0;
    margin: 24px 0;
    background: var(--border);
    border: 0;
    border-radius: 2px;
  }

  #preview img {
    max-width: 100%;
    height: auto;
    border-radius: 4px;
  }

  /* Task list checkboxes */
  #preview ul.contains-task-list {
    list-style: none;
    padding-left: 0;
  }
  #preview .task-list-item {
    position: relative;
    padding-left: 1.6em;
  }
  #preview .task-list-item input[type="checkbox"] {
    position: absolute;
    left: 0;
    top: 0.3em;
    margin: 0;
  }

  /* Toast notification */
  .toast {
    position: fixed;
    bottom: 20px;
    right: 20px;
    padding: 10px 20px;
    background: #2ea043;
    color: #fff;
    border-radius: 6px;
    font-size: 14px;
    box-shadow: 0 2px 8px var(--shadow);
    opacity: 0;
    transform: translateY(10px);
    transition: opacity 0.2s, transform 0.2s;
    z-index: 1000;
    pointer-events: none;
  }
  .toast.show {
    opacity: 1;
    transform: translateY(0);
  }

  /* Print styles */
  @media print {
    /* Force light theme for print even if dark mode is on */
    :root, [data-theme="dark"] {
      --bg: #ffffff;
      --bg-secondary: #f6f8fa;
      --text: #000000;
      --text-secondary: #444444;
      --border: #d0d7de;
      --preview-bg: #ffffff;
      --code-bg: #f6f8fa;
      --blockquote-border: #d0d7de;
      --blockquote-text: #444444;
      --table-border: #d0d7de;
      --table-row-alt: #f6f8fa;
      --link: #0969da;
    }

    /* Make backgrounds (code blocks, table rows) actually render */
    * {
      -webkit-print-color-adjust: exact !important;
      print-color-adjust: exact !important;
    }

    /* Unlock the 100vh / flex / scroll layout so ALL content flows across pages */
    html, body {
      height: auto !important;
      overflow: visible !important;
      display: block !important;
      background: #fff !important;
      color: #000 !important;
    }
    .toolbar, .editor-panel, .panel-header, .toast { display: none !important; }
    .main {
      display: block !important;
      height: auto !important;
      overflow: visible !important;
    }
    .panel {
      display: block !important;
      flex: none !important;
      height: auto !important;
      min-width: 0 !important;
      overflow: visible !important;
    }
    #preview {
      display: block !important;
      height: auto !important;
      max-height: none !important;
      overflow: visible !important;
      padding: 0 !important;
    }

    /* Avoid awkward breaks */
    #preview pre {
      white-space: pre-wrap;
      word-wrap: break-word;
      page-break-inside: avoid;
    }
    #preview table, #preview blockquote, #preview img,
    #preview tr, #preview li {
      page-break-inside: avoid;
    }
    #preview h1, #preview h2, #preview h3, #preview h4 {
      page-break-after: avoid;
    }

    @page { margin: 1.5cm; }
  }

  /* Responsive */
  @media (max-width: 768px) {
    .main {
      flex-direction: column;
    }
    .editor-panel {
      border-right: none;
      border-bottom: 1px solid var(--border);
    }
    .panel { flex: 1; min-height: 0; }
    .toolbar-title { font-size: 14px; }
    .toolbar button { padding: 5px 8px; font-size: 12px; }
    .toolbar button span { display: none; }
  }
</style>
</head>
<body>

<div class="toolbar">
  <div class="toolbar-title">Markdown Live Preview</div>
  <div class="toolbar-actions">
    <button onclick="toggleDarkMode()" id="theme-btn" title="Toggle dark mode">
      <svg id="theme-icon-light" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16"><path d="M8 12a4 4 0 1 0 0-8 4 4 0 0 0 0 8Zm0 1.5a5.5 5.5 0 1 1 0-11 5.5 5.5 0 0 1 0 11ZM8 0a.75.75 0 0 1 .75.75v1.5a.75.75 0 0 1-1.5 0V.75A.75.75 0 0 1 8 0Zm0 13a.75.75 0 0 1 .75.75v1.5a.75.75 0 0 1-1.5 0v-1.5A.75.75 0 0 1 8 13ZM2.343 2.343a.75.75 0 0 1 1.061 0l1.06 1.06a.75.75 0 0 1-1.06 1.061l-1.06-1.06a.75.75 0 0 1 0-1.06Zm9.193 9.193a.75.75 0 0 1 1.06 0l1.061 1.06a.75.75 0 0 1-1.06 1.061l-1.06-1.06a.75.75 0 0 1 0-1.061ZM0 8a.75.75 0 0 1 .75-.75h1.5a.75.75 0 0 1 0 1.5H.75A.75.75 0 0 1 0 8Zm13 0a.75.75 0 0 1 .75-.75h1.5a.75.75 0 0 1 0 1.5h-1.5A.75.75 0 0 1 13 8ZM2.343 13.657a.75.75 0 0 1 0-1.06l1.06-1.061a.75.75 0 1 1 1.061 1.06l-1.06 1.061a.75.75 0 0 1-1.06 0Zm9.193-9.193a.75.75 0 0 1 0-1.06l1.061-1.061a.75.75 0 1 1 1.06 1.06l-1.06 1.061a.75.75 0 0 1-1.06 0Z"/></svg>
      <svg id="theme-icon-dark" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" style="display:none"><path d="M9.598 1.591a.749.749 0 0 1 .785-.175 7.001 7.001 0 1 1-8.967 8.967.75.75 0 0 1 .961-.96 5.5 5.5 0 0 0 7.22-7.832Z"/></svg>
      <span>Dark mode</span>
    </button>
    <button onclick="openFile()" title="Open a markdown file from your computer">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16"><path d="M1.75 1A1.75 1.75 0 0 0 0 2.75v10.5C0 14.216.784 15 1.75 15h12.5A1.75 1.75 0 0 0 16 13.25v-8.5A1.75 1.75 0 0 0 14.25 3H7.5a.25.25 0 0 1-.2-.1l-.9-1.2C6.07 1.26 5.55 1 5 1H1.75Zm0 1.5h3.25a.25.25 0 0 1 .2.1l.9 1.2c.33.44.85.7 1.4.7h6.75a.25.25 0 0 1 .25.25v8.5a.25.25 0 0 1-.25.25H1.75a.25.25 0 0 1-.25-.25V2.75a.25.25 0 0 1 .25-.25Z"/></svg>
      <span>Open</span>
    </button>
    <input type="file" id="file-input" accept=".md,.markdown,.mdown,.mkd,.txt,text/markdown,text/plain" style="display:none">
    <button onclick="resetEditor()" title="Clear editor">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16"><path d="M5.03 3.97a.75.75 0 0 1 1.06 0L8 5.94l1.91-1.97a.75.75 0 1 1 1.08 1.04L9.06 7l1.94 1.97a.75.75 0 0 1-1.08 1.04L8 8.06 6.09 10.03a.75.75 0 1 1-1.06-1.06L6.94 7 5.03 5.03a.75.75 0 0 1 0-1.06Z"/><path d="M1.5 2.75a.25.25 0 0 1 .25-.25h12.5a.25.25 0 0 1 .25.25v10.5a.25.25 0 0 1-.25.25H1.75a.25.25 0 0 1-.25-.25Zm.25-1.75A1.75 1.75 0 0 0 0 2.75v10.5C0 14.216.784 15 1.75 15h12.5A1.75 1.75 0 0 0 16 13.25V2.75A1.75 1.75 0 0 0 14.25 1Z"/></svg>
      <span>Reset</span>
    </button>
    <button onclick="copyMarkdown()" title="Copy markdown">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16"><path d="M0 6.75C0 5.784.784 5 1.75 5h1.5a.75.75 0 0 1 0 1.5h-1.5a.25.25 0 0 0-.25.25v7.5c0 .138.112.25.25.25h7.5a.25.25 0 0 0 .25-.25v-1.5a.75.75 0 0 1 1.5 0v1.5A1.75 1.75 0 0 1 9.25 16h-7.5A1.75 1.75 0 0 1 0 14.25ZM5 1.75C5 .784 5.784 0 6.75 0h7.5C15.216 0 16 .784 16 1.75v7.5A1.75 1.75 0 0 1 14.25 11h-7.5A1.75 1.75 0 0 1 5 9.25Zm1.75-.25a.25.25 0 0 0-.25.25v7.5c0 .138.112.25.25.25h7.5a.25.25 0 0 0 .25-.25v-7.5a.25.25 0 0 0-.25-.25Z"/></svg>
      <span>Copy</span>
    </button>
    <button onclick="exportPDF()" title="Export as PDF">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16"><path d="M4.75 7.5a.75.75 0 0 0 0 1.5h6.5a.75.75 0 0 0 0-1.5h-6.5Zm0 3a.75.75 0 0 0 0 1.5h3.5a.75.75 0 0 0 0-1.5h-3.5Z"/><path d="M2 1.75C2 .784 2.784 0 3.75 0h5.586c.464 0 .909.184 1.237.513l2.914 2.914c.329.328.513.773.513 1.237v9.586A1.75 1.75 0 0 1 12.25 16h-8.5A1.75 1.75 0 0 1 2 14.25Zm1.75-.25a.25.25 0 0 0-.25.25v12.5c0 .138.112.25.25.25h8.5a.25.25 0 0 0 .25-.25V4.664a.25.25 0 0 0-.073-.177l-2.914-2.914a.25.25 0 0 0-.177-.073Z"/></svg>
      <span>Export PDF</span>
    </button>
  </div>
</div>

<div class="main">
  <div class="panel editor-panel">
    <div class="panel-header">Editor</div>
    <textarea id="editor" spellcheck="false"></textarea>
  </div>
  <div class="panel">
    <div class="panel-header">Preview</div>
    <div id="preview"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const editor = document.getElementById('editor');
const preview = document.getElementById('preview');
const themeBtn = document.getElementById('theme-btn');
const iconLight = document.getElementById('theme-icon-light');
const iconDark = document.getElementById('theme-icon-dark');
const hljsLight = document.getElementById('hljs-light');
const hljsDark = document.getElementById('hljs-dark');
const toastEl = document.getElementById('toast');
const fileInput = document.getElementById('file-input');
const editorPanel = document.querySelector('.editor-panel');
const previewPanel = preview.closest('.panel');

// Configure marked
marked.setOptions({
  gfm: true,
  breaks: true,
  highlight: function(code, lang) {
    if (lang && hljs.getLanguage(lang)) {
      try { return hljs.highlight(code, { language: lang }).value; } catch (e) {}
    }
    try { return hljs.highlightAuto(code).value; } catch (e) {}
    return code;
  }
});

// Render markdown
function render() {
  const raw = marked.parse(editor.value);
  preview.innerHTML = DOMPurify.sanitize(raw, { ADD_ATTR: ['target'] });
}

// Debounced render
let renderTimeout;
editor.addEventListener('input', function() {
  clearTimeout(renderTimeout);
  renderTimeout = setTimeout(render, 30);
});

// Sync scroll
let syncingScroll = false;

editor.addEventListener('scroll', function() {
  if (syncingScroll) return;
  syncingScroll = true;
  const pct = editor.scrollTop / (editor.scrollHeight - editor.clientHeight || 1);
  preview.scrollTop = pct * (preview.scrollHeight - preview.clientHeight);
  requestAnimationFrame(() => { syncingScroll = false; });
});

preview.addEventListener('scroll', function() {
  if (syncingScroll) return;
  syncingScroll = true;
  const pct = preview.scrollTop / (preview.scrollHeight - preview.clientHeight || 1);
  editor.scrollTop = pct * (editor.scrollHeight - editor.clientHeight);
  requestAnimationFrame(() => { syncingScroll = false; });
});

// Dark mode
function setTheme(dark) {
  document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
  iconLight.style.display = dark ? 'none' : 'block';
  iconDark.style.display = dark ? 'block' : 'none';
  hljsLight.disabled = dark;
  hljsDark.disabled = !dark;
  themeBtn.querySelector('span').textContent = dark ? 'Light mode' : 'Dark mode';
  localStorage.setItem('md-preview-dark', dark ? '1' : '0');
}

function toggleDarkMode() {
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  setTheme(!isDark);
  // Re-render to apply highlight theme
  render();
}

// Reset editor
function resetEditor() {
  editor.value = '';
  preview.innerHTML = '';
  editor.focus();
}

// Copy markdown
async function copyMarkdown() {
  try {
    await navigator.clipboard.writeText(editor.value);
    showToast('Markdown copied to clipboard');
  } catch (e) {
    showToast('Failed to copy');
  }
}

// Open a markdown file from disk
function openFile() {
  fileInput.click();
}

fileInput.addEventListener('change', function() {
  const file = this.files && this.files[0];
  if (file) loadFile(file);
  this.value = ''; // reset so picking the same file again re-fires change
});

function loadFile(file) {
  const reader = new FileReader();
  reader.onload = function() {
    editor.value = String(reader.result);
    render();
    editor.scrollTop = 0;
    preview.scrollTop = 0;
    showToast('Loaded ' + file.name);
  };
  reader.onerror = function() { showToast('Could not read file'); };
  reader.readAsText(file);
}

// Drag & drop a file onto either panel
function isFileDrag(e) {
  return e.dataTransfer && Array.from(e.dataTransfer.types).includes('Files');
}
// Stop the browser from navigating away if a file is dropped off-target
['dragover', 'drop'].forEach(function(evt) {
  window.addEventListener(evt, function(e) { if (isFileDrag(e)) e.preventDefault(); });
});
[editorPanel, previewPanel].forEach(function(zone) {
  zone.addEventListener('dragover', function(e) {
    if (!isFileDrag(e)) return;
    e.preventDefault();
    zone.classList.add('drag-over');
  });
  zone.addEventListener('dragleave', function() { zone.classList.remove('drag-over'); });
  zone.addEventListener('drop', function(e) {
    e.preventDefault();
    zone.classList.remove('drag-over');
    const file = e.dataTransfer.files && e.dataTransfer.files[0];
    if (file) loadFile(file);
  });
});

// Derive a document title from the first heading (used as the suggested
// PDF filename in the print dialog), falling back to a default.
function getDocTitle() {
  const h = preview.querySelector('h1, h2');
  const text = h && h.textContent.trim();
  if (text) return text.slice(0, 80).replace(/[\\/:*?"<>|]+/g, '-').trim();
  return 'document';
}

function escapeHtml(str) {
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// Self-contained stylesheet for the print document. Native print renders real
// text (crisp, selectable, correctly spaced) and paginates automatically —
// unlike a canvas rasterizer. Long code lines and wide tables are forced to
// wrap so nothing is clipped off the right edge of the page.
const PRINT_STYLES = `
  * { box-sizing: border-box; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif;
    color: #1f2328; background: #fff; line-height: 1.6;
    margin: 0; padding: 0; -webkit-font-smoothing: antialiased;
  }
  .markdown-body { max-width: 100%; }
  h1, h2, h3, h4, h5, h6 { margin: 24px 0 16px; font-weight: 600; line-height: 1.25; page-break-after: avoid; }

// Export PDF via the browser's native print engine, using a hidden iframe so
// no new tab/window opens. The print dialog appears over the current page;
// choose "Save as PDF" as the destination. Margins come from the @page rule
// (keep the dialog's "Margins" setting on Default).
function exportPDF() {
  if (!editor.value.trim()) { showToast('Nothing to export'); return; }
  render();

  const title = getDocTitle();
  const hljsHref = 'https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github.min.css';

  // Remove any leftover print frame from a previous export
  const prev = document.getElementById('print-frame');
  if (prev) prev.remove();

  const iframe = document.createElement('iframe');
  iframe.id = 'print-frame';
  iframe.setAttribute('aria-hidden', 'true');
  iframe.style.cssText = 'position:fixed;right:0;bottom:0;width:0;height:0;border:0;visibility:hidden;';
  document.body.appendChild(iframe);

  const doc = iframe.contentWindow.document;
  doc.open();
  doc.write(
    '<!DOCTYPE html><html><head><meta charset="utf-8">' +
    '<title>' + escapeHtml(title) + '</title>' +
    '<link rel="stylesheet" href="' + hljsHref + '">' +
    '<style>' + PRINT_STYLES + '</style></head>' +
    '<body><article class="markdown-body">' + preview.innerHTML + '</article></body></html>'
  );
  doc.close();

  // The Save-as-PDF dialog suggests a filename from the top document's title,
  // so set it temporarily and restore afterward.
  const originalTitle = document.title;
  const cleanup = function() {
    document.title = originalTitle;
    const f = document.getElementById('print-frame');
    if (f) f.remove();
  };

  let printed = false;
  const triggerPrint = function() {
    if (printed) return;
    printed = true;
    document.title = title;
    iframe.contentWindow.focus();
    iframe.contentWindow.print();
    // afterprint isn't guaranteed everywhere — clean up on a delay too
    setTimeout(cleanup, 1000);
  };
  iframe.contentWindow.onafterprint = cleanup;

  const link = doc.querySelector('link[rel="stylesheet"]');
  if (link) {
    link.addEventListener('load', triggerPrint);
    link.addEventListener('error', triggerPrint);
  }
  // Fallback if the stylesheet load/error never fires (cached/offline)
  setTimeout(triggerPrint, 700);
}

// Toast
function showToast(msg) {
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  setTimeout(() => toastEl.classList.remove('show'), 2000);
}

// Tab key support in editor
editor.addEventListener('keydown', function(e) {
  if (e.key === 'Tab') {
    e.preventDefault();
    const start = this.selectionStart;
    const end = this.selectionEnd;
    this.value = this.value.substring(0, start) + '    ' + this.value.substring(end);
    this.selectionStart = this.selectionEnd = start + 4;
    render();
  }
});

        return arr

    middle = [x for x in arr if x == pivot]
