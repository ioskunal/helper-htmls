<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Markdown Live Preview</title>

<!-- marked.js -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<!-- DOMPurify -->
<script src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js"></script>
<!-- highlight.js -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github.min.css" id="hljs-light">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github-dark.min.css" id="hljs-dark" disabled>
<script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>

<style>
  :root {
    --bg: #ffffff;
    --bg-secondary: #f6f8fa;
    --text: #1f2328;
    --text-secondary: #656d76;
    --border: #d0d7de;
    --toolbar-bg: #f6f8fa;
    --toolbar-border: #d0d7de;
    --editor-bg: #ffffff;
    --preview-bg: #ffffff;
    --btn-bg: #f6f8fa;
    --btn-hover: #eaeef2;
    --btn-text: #1f2328;
    --code-bg: #f6f8fa;
    --blockquote-border: #d0d7de;
    --blockquote-text: #656d76;
    --table-border: #d0d7de;
    --table-row-alt: #f6f8fa;
    --link: #0969da;
    --scrollbar-thumb: #c1c1c1;
    --scrollbar-track: #f1f1f1;
    --shadow: rgba(31, 35, 40, 0.12);
  }

  [data-theme="dark"] {
    --bg: #0d1117;
    --bg-secondary: #161b22;
    --text: #e6edf3;
    --text-secondary: #8b949e;
    --border: #30363d;
    --toolbar-bg: #161b22;
    --toolbar-border: #30363d;
    --editor-bg: #0d1117;
    --preview-bg: #0d1117;
    --btn-bg: #21262d;
    --btn-hover: #30363d;
    --btn-text: #e6edf3;
    --code-bg: #161b22;
    --blockquote-border: #30363d;
    --blockquote-text: #8b949e;
    --table-border: #30363d;
    --table-row-alt: #161b22;
    --link: #58a6ff;
    --scrollbar-thumb: #484f58;
    --scrollbar-track: #161b22;
    --shadow: rgba(0, 0, 0, 0.3);
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    transition: background 0.2s, color 0.2s;
  }

  /* Toolbar */
  .toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 16px;
    background: var(--toolbar-bg);
    border-bottom: 1px solid var(--toolbar-border);
    flex-shrink: 0;
    gap: 8px;
    flex-wrap: wrap;
  }

  .toolbar-title {
    font-size: 16px;
    font-weight: 600;
    white-space: nowrap;
  }

  .toolbar-actions {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .toolbar button {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 6px 12px;
    font-size: 13px;
    font-family: inherit;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--btn-bg);
    color: var(--btn-text);
    cursor: pointer;
    transition: background 0.15s;
    white-space: nowrap;
  }

  .toolbar button:hover {
    background: var(--btn-hover);
  }

  .toolbar button svg {
    width: 16px;
    height: 16px;
    fill: currentColor;
  }

  /* Main panels */
  .main {
    display: flex;
    flex: 1;
    min-height: 0;
  }

  .panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }

  .panel-header {
    padding: 6px 16px;
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-secondary);
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .editor-panel {
    border-right: 1px solid var(--border);
  }

  #editor {
    flex: 1;
    width: 100%;
    padding: 16px;
    font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
    font-size: 14px;
    line-height: 1.6;
    border: none;
    outline: none;
    resize: none;
    background: var(--editor-bg);
    color: var(--text);
    tab-size: 4;
  }

  #preview {
    flex: 1;
    padding: 16px 24px;
    overflow-y: auto;
    background: var(--preview-bg);
    line-height: 1.6;
  }

  /* Scrollbar styling */
  #editor::-webkit-scrollbar,
  #preview::-webkit-scrollbar {
    width: 8px;
  }
  #editor::-webkit-scrollbar-track,
  #preview::-webkit-scrollbar-track {
    background: var(--scrollbar-track);
  }
  #editor::-webkit-scrollbar-thumb,
  #preview::-webkit-scrollbar-thumb {
    background: var(--scrollbar-thumb);
    border-radius: 4px;
  }

  /* Markdown rendered styles */
  #preview h1, #preview h2, #preview h3,
  #preview h4, #preview h5, #preview h6 {
    margin-top: 24px;
    margin-bottom: 16px;
    font-weight: 600;
    line-height: 1.25;
  }
  #preview h1 { font-size: 2em; padding-bottom: 0.3em; border-bottom: 1px solid var(--border); }
  #preview h2 { font-size: 1.5em; padding-bottom: 0.3em; border-bottom: 1px solid var(--border); }
  #preview h3 { font-size: 1.25em; }
  #preview h4 { font-size: 1em; }
  #preview h5 { font-size: 0.875em; }
  #preview h6 { font-size: 0.85em; color: var(--text-secondary); }

  #preview p { margin-bottom: 16px; }

  #preview a { color: var(--link); text-decoration: none; }
  #preview a:hover { text-decoration: underline; }

  #preview strong { font-weight: 600; }

  #preview ul, #preview ol {
    padding-left: 2em;
    margin-bottom: 16px;
  }
  #preview li { margin-bottom: 4px; }
  #preview li + li { margin-top: 4px; }

  #preview blockquote {
    margin: 0 0 16px;
    padding: 0 1em;
    color: var(--blockquote-text);
    border-left: 0.25em solid var(--blockquote-border);
  }

  #preview code {
    padding: 0.2em 0.4em;
    font-size: 85%;
    background: var(--code-bg);
    border-radius: 6px;
    font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
  }

  #preview pre {
    margin-bottom: 16px;
    padding: 16px;
    overflow-x: auto;
    background: var(--code-bg);
    border-radius: 6px;
    line-height: 1.45;
  }

  #preview pre code {
    padding: 0;
    background: transparent;
    font-size: 85%;
  }

  #preview table {
    border-collapse: collapse;
    width: 100%;
    margin-bottom: 16px;
  }
  #preview th, #preview td {
    padding: 6px 13px;
    border: 1px solid var(--table-border);
  }
  #preview th {
    font-weight: 600;
    background: var(--bg-secondary);
  }
  #preview tr:nth-child(even) {
    background: var(--table-row-alt);
  }

  #preview hr {
    height: 0.25em;
    padding: 0;
    margin: 24px 0;
    background: var(--border);
    border: 0;
    border-radius: 2px;
  }

  #preview img {
    max-width: 100%;
    height: auto;
    border-radius: 4px;
  }

  /* Task list checkboxes */
  #preview ul.contains-task-list {
    list-style: none;
    padding-left: 0;
  }
  #preview .task-list-item {
    position: relative;
    padding-left: 1.6em;
  }
  #preview .task-list-item input[type="checkbox"] {
    position: absolute;
    left: 0;
    top: 0.3em;
    margin: 0;
  }

  /* Toast notification */
  .toast {
    position: fixed;
    bottom: 20px;
    right: 20px;
    padding: 10px 20px;
    background: #2ea043;
    color: #fff;
    border-radius: 6px;
    font-size: 14px;
    box-shadow: 0 2px 8px var(--shadow);
    opacity: 0;
    transform: translateY(10px);
    transition: opacity 0.2s, transform 0.2s;
    z-index: 1000;
    pointer-events: none;
  }
  .toast.show {
    opacity: 1;
    transform: translateY(0);
  }

  /* Print styles */
  @media print {
    /* Force light theme for print even if dark mode is on */
    :root, [data-theme="dark"] {
      --bg: #ffffff;
      --bg-secondary: #f6f8fa;
      --text: #000000;
      --text-secondary: #444444;
      --border: #d0d7de;
      --preview-bg: #ffffff;
      --code-bg: #f6f8fa;
      --blockquote-border: #d0d7de;
      --blockquote-text: #444444;
      --table-border: #d0d7de;
      --table-row-alt: #f6f8fa;
      --link: #0969da;
    }

    /* Make backgrounds (code blocks, table rows) actually render */
    * {
      -webkit-print-color-adjust: exact !important;
      print-color-adjust: exact !important;
    }

    /* Unlock the 100vh / flex / scroll layout so ALL content flows across pages */
    html, body {
      height: auto !important;
      overflow: visible !important;
      display: block !important;
      background: #fff !important;
      color: #000 !important;
    }
    .toolbar, .editor-panel, .panel-header, .toast { display: none !important; }
    .main {
      display: block !important;
      height: auto !important;
      overflow: visible !important;
    }
    .panel {
      display: block !important;
      flex: none !important;
      height: auto !important;
      min-width: 0 !important;
      overflow: visible !important;
    }
    #preview {
      display: block !important;
      height: auto !important;
      max-height: none !important;
      overflow: visible !important;
      padding: 0 !important;
    }

    /* Avoid awkward breaks */
    #preview pre {
      white-space: pre-wrap;
      word-wrap: break-word;
      page-break-inside: avoid;
    }
    #preview table, #preview blockquote, #preview img,
    #preview tr, #preview li {
      page-break-inside: avoid;
    }
    #preview h1, #preview h2, #preview h3, #preview h4 {
      page-break-after: avoid;
    }

    @page { margin: 1.5cm; }
  }

  /* Responsive */
  @media (max-width: 768px) {
    .main {
      flex-direction: column;
    }
    .editor-panel {
      border-right: none;
      border-bottom: 1px solid var(--border);
    }
    .panel { flex: 1; min-height: 0; }
    .toolbar-title { font-size: 14px; }
    .toolbar button { padding: 5px 8px; font-size: 12px; }
    .toolbar button span { display: none; }
  }
</style>
</head>
<body>

<div class="toolbar">
  <div class="toolbar-title">Markdown Live Preview</div>
  <div class="toolbar-actions">
    <button onclick="toggleDarkMode()" id="theme-btn" title="Toggle dark mode">
      <svg id="theme-icon-light" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16"><path d="M8 12a4 4 0 1 0 0-8 4 4 0 0 0 0 8Zm0 1.5a5.5 5.5 0 1 1 0-11 5.5 5.5 0 0 1 0 11ZM8 0a.75.75 0 0 1 .75.75v1.5a.75.75 0 0 1-1.5 0V.75A.75.75 0 0 1 8 0Zm0 13a.75.75 0 0 1 .75.75v1.5a.75.75 0 0 1-1.5 0v-1.5A.75.75 0 0 1 8 13ZM2.343 2.343a.75.75 0 0 1 1.061 0l1.06 1.06a.75.75 0 0 1-1.06 1.061l-1.06-1.06a.75.75 0 0 1 0-1.06Zm9.193 9.193a.75.75 0 0 1 1.06 0l1.061 1.06a.75.75 0 0 1-1.06 1.061l-1.06-1.06a.75.75 0 0 1 0-1.061ZM0 8a.75.75 0 0 1 .75-.75h1.5a.75.75 0 0 1 0 1.5H.75A.75.75 0 0 1 0 8Zm13 0a.75.75 0 0 1 .75-.75h1.5a.75.75 0 0 1 0 1.5h-1.5A.75.75 0 0 1 13 8ZM2.343 13.657a.75.75 0 0 1 0-1.06l1.06-1.061a.75.75 0 1 1 1.061 1.06l-1.06 1.061a.75.75 0 0 1-1.06 0Zm9.193-9.193a.75.75 0 0 1 0-1.06l1.061-1.061a.75.75 0 1 1 1.06 1.06l-1.06 1.061a.75.75 0 0 1-1.06 0Z"/></svg>
      <svg id="theme-icon-dark" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" style="display:none"><path d="M9.598 1.591a.749.749 0 0 1 .785-.175 7.001 7.001 0 1 1-8.967 8.967.75.75 0 0 1 .961-.96 5.5 5.5 0 0 0 7.22-7.832Z"/></svg>

      <span>Export PDF</span>

</div>

<div class="main">
  <div class="panel editor-panel">
    <div class="panel-header">Editor</div>
    <textarea id="editor" spellcheck="false"></textarea>
  </div>
  <div class="panel">
    <div class="panel-header">Preview</div>
    <div id="preview"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const editor = document.getElementById('editor');
const preview = document.getElementById('preview');
const themeBtn = document.getElementById('theme-btn');
const iconLight = document.getElementById('theme-icon-light');
const iconDark = document.getElementById('theme-icon-dark');
const hljsLight = document.getElementById('hljs-light');
const hljsDark = document.getElementById('hljs-dark');
const toastEl = document.getElementById('toast');

// Configure marked
marked.setOptions({
  gfm: true,
  breaks: true,
  highlight: function(code, lang) {
    if (lang && hljs.getLanguage(lang)) {
      try { return hljs.highlight(code, { language: lang }).value; } catch (e) {}
    }
    try { return hljs.highlightAuto(code).value; } catch (e) {}
    return code;
  }
});

// Render markdown
function render() {
  const raw = marked.parse(editor.value);
  preview.innerHTML = DOMPurify.sanitize(raw, { ADD_ATTR: ['target'] });
}

// Debounced render
let renderTimeout;
editor.addEventListener('input', function() {
  clearTimeout(renderTimeout);
  renderTimeout = setTimeout(render, 30);
});

// Sync scroll
let syncingScroll = false;

editor.addEventListener('scroll', function() {
  if (syncingScroll) return;
  syncingScroll = true;
  const pct = editor.scrollTop / (editor.scrollHeight - editor.clientHeight || 1);
  preview.scrollTop = pct * (preview.scrollHeight - preview.clientHeight);
  requestAnimationFrame(() => { syncingScroll = false; });
});

preview.addEventListener('scroll', function() {
  if (syncingScroll) return;
  syncingScroll = true;
  const pct = preview.scrollTop / (preview.scrollHeight - preview.clientHeight || 1);
  editor.scrollTop = pct * (editor.scrollHeight - editor.clientHeight);
  requestAnimationFrame(() => { syncingScroll = false; });
});

// Dark mode
function setTheme(dark) {
  document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
  iconLight.style.display = dark ? 'none' : 'block';
  iconDark.style.display = dark ? 'block' : 'none';
  hljsLight.disabled = dark;
  hljsDark.disabled = !dark;
  themeBtn.querySelector('span').textContent = dark ? 'Light mode' : 'Dark mode';
  localStorage.setItem('md-preview-dark', dark ? '1' : '0');
}

function toggleDarkMode() {
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  setTheme(!isDark);
  // Re-render to apply highlight theme
  render();
}

// Reset editor
function resetEditor() {
  editor.value = '';
  preview.innerHTML = '';
  editor.focus();
}

// Copy markdown
async function copyMarkdown() {
  try {
    await navigator.clipboard.writeText(editor.value);
    showToast('Markdown copied to clipboard');
  } catch (e) {
    showToast('Failed to copy');
  }
}

// Export PDF
function exportPDF() {
  window.print();
}

// Toast
function showToast(msg) {
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  setTimeout(() => toastEl.classList.remove('show'), 2000);
}

// Tab key support in editor
editor.addEventListener('keydown', function(e) {
  if (e.key === 'Tab') {
    e.preventDefault();
    const start = this.selectionStart;
    const end = this.selectionEnd;
    this.value = this.value.substring(0, start) + '    ' + this.value.substring(end);
    this.selectionStart = this.selectionEnd = start + 4;
    render();
  }
});

// Default sample content
const sampleMarkdown = `# Markdown Live Preview

Welcome to the **Markdown Live Preview** editor! Type in the left panel and see the rendered output on the right.

---

## Features

- **Real-time preview** as you type
- **Synchronized scrolling** between editor and preview
- **Dark mode** toggle (persisted across sessions)
- **GitHub Flavored Markdown** support
- **Syntax highlighting** for code blocks
- **Export to PDF** via browser print dialog

## Text Formatting

You can write **bold**, *italic*, ~~strikethrough~~, and \`inline code\`.

> Blockquotes are great for highlighting important information or quoting someone.

## Links & Images

[Visit GitHub](https://github.com) for more information.

![Placeholder](https://via.placeholder.com/600x200/0969da/ffffff?text=Markdown+Preview)

## Lists

### Unordered
- First item
- Second item
  - Nested item A
  - Nested item B
- Third item

### Ordered
1. Step one
2. Step two
3. Step three

### Task List
- [x] Set up project
- [x] Build editor layout
- [x] Add live preview
- [ ] Write documentation
- [ ] Deploy to production

## Code Blocks

Inline: \`const x = 42;\`

\`\`\`javascript
// Fibonacci sequence generator
function* fibonacci() {
  let a = 0, b = 1;
  while (true) {
    yield a;
    [a, b] = [b, a + b];
  }
}

const fib = fibonacci();
for (let i = 0; i < 10; i++) {
  console.log(fib.next().value);
}
\`\`\`

\`\`\`python
# Quick sort implementation
def quicksort(arr):
    if len(arr) <= 1:
        return arr
    pivot = arr[len(arr) // 2]
    left = [x for x in arr if x < pivot]
    middle = [x for x in arr if x == pivot]
    right = [x for x in arr if x > pivot]
    return quicksort(left) + middle + quicksort(right)

print(quicksort([3, 6, 8, 10, 1, 2, 1]))
\`\`\`

## Tables

| Feature        | Status | Notes                  |
|----------------|--------|------------------------|
| Live Preview   | Done   | Updates on every keystroke |
| Sync Scroll    | Done   | Percentage-based sync  |
| Dark Mode      | Done   | Persisted in localStorage |
| GFM Support    | Done   | Tables, task lists, etc. |
| Export PDF     | Done   | Uses browser print     |

## Horizontal Rule

---

## Math-like Formatting

The area of a circle is \`A = πr²\` where \`r\` is the radius.

## Nested Blockquotes

> Level 1
>
> > Level 2
> >
> > > Level 3 — deeply nested!

## HTML Support

<details>
<summary>Click to expand</summary>

This is hidden content inside a \`<details>\` element. Markdown **still works** here!

</details>

---

*Made with ❤ — Start editing to see the magic!*
`;

// Init
(function init() {
  // Restore theme
  const savedDark = localStorage.getItem('md-preview-dark');
  if (savedDark === '1' || (!savedDark && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
    setTheme(true);
  } else {
    setTheme(false);
  }

  // Load sample content
  editor.value = sampleMarkdown;
  render();
})();
</script>
</body>
</html>
